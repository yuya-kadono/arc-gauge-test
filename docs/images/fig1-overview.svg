<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 168" width="620" height="168">
  <defs>
    <!-- gaugeArc: 同じパスを下部だけ見せるためクリップ -->
    <clipPath id="gauge-clip-fig1">
      <rect x="215" y="79" width="130" height="37"/>
    </clipPath>
  </defs>

  <!-- root background -->
  <rect x="0" y="0" width="620" height="168" rx="6" fill="#f0f2f5" stroke="#ccc" stroke-width="1"/>

  <!-- 操作パネル -->
  <rect x="8" y="10" width="155" height="120" rx="4" fill="#dce8f7" stroke="#7aa8d4" stroke-width="1.5"/>
  <text x="85" y="68" text-anchor="middle" font-size="13" fill="#2a5a9f" font-family="sans-serif">操作パネル</text>
  <text x="85" y="86" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">(スライダー群)</text>

  <!-- highSlider -->
  <rect x="180" y="20" width="22" height="100" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <rect x="187" y="20" width="8" height="100" rx="2" fill="#bbb"/>
  <rect x="183" y="52" width="16" height="6" rx="2" fill="#6a9fd8"/>

  <!-- highArrow -->
  <text x="212" y="57" font-size="16" fill="#e05050" font-family="sans-serif">▶</text>

  <!-- baseClipArea -->
  <rect x="232" y="10" width="100" height="120" rx="2" fill="#f8f8f8" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- borderArc (gray border ring) -->
  <path d="M 295,25 A 80,80 0 0,1 295,115" stroke="#808080" stroke-width="18" fill="none" stroke-linecap="butt"/>
  <!-- backgroundArc (light gray, full) -->
  <path d="M 295,29 A 74,74 0 0,1 295,111" stroke="#d3d3d3" stroke-width="10" fill="none" stroke-linecap="butt"/>
  <!-- gaugeArc (blue): 同パスをクリップで下部のみ表示 -->
  <path d="M 295,29 A 74,74 0 0,1 295,111" stroke="#4a6fa5" stroke-width="10" fill="none" stroke-linecap="butt" clip-path="url(#gauge-clip-fig1)"/>

  <!-- lowArrow -->
  <text x="338" y="57" font-size="16" fill="#50a050" font-family="sans-serif">◀</text>

  <!-- lowSlider -->
  <rect x="360" y="20" width="22" height="100" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <rect x="367" y="20" width="8" height="100" rx="2" fill="#bbb"/>
  <rect x="363" y="68" width="16" height="6" rx="2" fill="#6ab86a"/>

  <!-- ラベル: 2段組みで重なり回避 -->
  <!-- 1段目 (y=138): highSlider / baseClipArea / lowSlider -->
  <text x="191" y="138" text-anchor="middle" font-size="11" fill="#444" font-family="sans-serif">highSlider</text>
  <text x="282" y="138" text-anchor="middle" font-size="11" fill="#444" font-family="sans-serif">baseClipArea</text>
  <text x="371" y="138" text-anchor="middle" font-size="11" fill="#444" font-family="sans-serif">lowSlider</text>
  <!-- 2段目 (y=155): highArrow / lowArrow (リーダー線付き) -->
  <line x1="222" y1="131" x2="222" y2="143" stroke="#e05050" stroke-width="1"/>
  <text x="222" y="155" text-anchor="middle" font-size="11" fill="#e05050" font-family="sans-serif">highArrow</text>
  <line x1="343" y1="131" x2="343" y2="143" stroke="#50a050" stroke-width="1"/>
  <text x="343" y="155" text-anchor="middle" font-size="11" fill="#50a050" font-family="sans-serif">lowArrow</text>

  <!-- legend -->
  <rect x="420" y="18" width="190" height="105" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="515" y="34" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="sans-serif">凡例</text>
  <rect x="432" y="42" width="14" height="8" fill="#808080"/>
  <text x="452" y="51" font-size="11" fill="#333" font-family="sans-serif">borderArc (border)</text>
  <rect x="432" y="58" width="14" height="8" fill="#d3d3d3"/>
  <text x="452" y="67" font-size="11" fill="#333" font-family="sans-serif">backgroundArc (bg)</text>
  <rect x="432" y="74" width="14" height="8" fill="#4a6fa5"/>
  <text x="452" y="83" font-size="11" fill="#333" font-family="sans-serif">gaugeArc (value)</text>
  <rect x="432" y="90" width="14" height="8" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="452" y="99" font-size="11" fill="#333" font-family="sans-serif">縦スライダー</text>
  <text x="432" y="115" font-size="11" fill="#333" font-family="sans-serif">▶ / ◀ マーカー矢印</text>
</svg>
