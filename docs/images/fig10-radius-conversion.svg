<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <rect width="560" height="160" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>

  <!-- LEFT: ArcItem -->
  <text x="130" y="20" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="sans-serif">ArcItem</text>
  <!-- bounding box -->
  <rect x="20" y="30" width="220" height="120" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- center at (130, 90), schematic: strokeWidth=40, innerR=70, outerR=110 -->
  <!-- arc from arcBegin=60(SVG=-30) to arcEnd=120(SVG=30) -->
  <!-- outer: start=(130+110*cos-30, 90-55)=(130+95.3,35)=(225.3,35), end=(225.3,145) -->
  <!-- inner: start=(130+70*cos-30, 90-35)=(130+60.6,55)=(190.6,55), end=(190.6,125) -->
  <path d="M 225.3,35 A 110,110 0 0,1 225.3,145 L 190.6,125 A 70,70 0 0,0 190.6,55 Z"
        fill="#c0c0c0" opacity="0.7"/>
  <!-- bbox height annotation -->
  <line x1="20" y1="35" x2="20" y2="145" stroke="#e07020" stroke-width="2"/>
  <line x1="14" y1="35" x2="26" y2="35" stroke="#e07020" stroke-width="1.5"/>
  <line x1="14" y1="145" x2="26" y2="145" stroke="#e07020" stroke-width="1.5"/>
  <text x="6" y="93" text-anchor="middle" font-size="10" fill="#e07020" font-family="sans-serif" writing-mode="vertical-rl" transform="rotate(-90, 13, 90)">arcH</text>
  <text x="50" y="20" font-size="10" fill="#aaa" font-family="sans-serif">bbox (= arcH × arcH)</text>

  <!-- outerR annotation -->
  <line x1="130" y1="90" x2="225.3" y2="35" stroke="#a0a0a0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="182" y="55" font-size="10" fill="#808080" font-family="sans-serif">outerR</text>
  <!-- innerR annotation -->
  <line x1="130" y1="90" x2="190.6" y2="55" stroke="#606060" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="150" y="65" font-size="10" fill="#555" font-family="sans-serif">innerR</text>
  <!-- outer edge label -->
  <text x="230" y="90" font-size="10" fill="#888" font-family="sans-serif">外縁=</text>
  <text x="226" y="102" font-size="10" fill="#888" font-family="sans-serif">bbox端</text>

  <!-- DIVIDER -->
  <line x1="270" y1="15" x2="270" y2="155" stroke="#ddd" stroke-width="2"/>

  <!-- RIGHT: PathAngleArc (shifted right by 20px: center=420 instead of 400) -->
  <text x="420" y="20" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="sans-serif">PathAngleArc</text>
  <!-- center at (420, 90) -->
  <!-- outer: start=(420+95.3,35)=(515.3,35), end=(515.3,145) -->
  <!-- inner: start=(420+60.6,55)=(480.6,55), end=(480.6,125) -->
  <path d="M 515.3,35 A 110,110 0 0,1 515.3,145 L 480.6,125 A 70,70 0 0,0 480.6,55 Z"
        fill="#c0c0c0" opacity="0.7"/>
  <!-- center line (radiusX=90): start=(420+77.9,45)=(497.9,45), end=(497.9,135) -->
  <path d="M 497.9,45 A 90,90 0 0,1 497.9,135" fill="none" stroke="#e05050" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- center line annotation -->
  <line x1="420" y1="90" x2="497.9" y2="45" stroke="#e05050" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="358" y="52" font-size="10" fill="#e05050" font-family="sans-serif">radiusX =</text>
  <text x="356" y="64" font-size="10" fill="#e05050" font-family="sans-serif">arcH/2 − sw/2</text>
  <text x="358" y="76" font-size="10" fill="#e05050" font-family="sans-serif">= innerR + sw/2</text>

  <!-- stroke width indicator -->
  <line x1="528" y1="55" x2="528" y2="125" stroke="#333" stroke-width="1"/>
  <line x1="524" y1="55" x2="532" y2="55" stroke="#333" stroke-width="1"/>
  <line x1="524" y1="125" x2="532" y2="125" stroke="#333" stroke-width="1"/>
  <text x="534" y="93" font-size="10" fill="#333" font-family="sans-serif">sw</text>
  <!-- half sw markers -->
  <line x1="515.3" y1="90" x2="497.9" y2="90" stroke="#aaa" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="497.9" y1="90" x2="480.6" y2="90" stroke="#aaa" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="507" y="88" font-size="9" fill="#aaa" font-family="sans-serif">sw/2</text>
  <text x="489" y="88" font-size="9" fill="#aaa" font-family="sans-serif">sw/2</text>
</svg>
