<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="380" height="180">
  <rect width="380" height="180" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>

  <!-- scale 0.45: arcRightMargin=0 → endpoints at x=0 (left edge of baseClipArea) -->
  <!-- circle center at (53, 90), innerR=112.5, outerR=135, sw=22.5 -->

  <!-- full circle dashed -->
  <circle cx="53" cy="90" r="112.5" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- arc ring at minClipWidth (endpoint at left edge) -->
  <!-- outer: start=(53+135*sin60, 90-67.5)=(189.9,22.5), end=(189.9,157.5) -->
  <!-- inner: start=(53+112.5*sin60, 90-56.25)=(150.4,33.75), end=(150.4,146.25) -->
  <path d="M 189.9,22.5 A 135,135 0 0,1 189.9,157.5 L 150.4,146.25 A 112.5,112.5 0 0,0 150.4,33.75 Z"
        fill="#c0c0c0" opacity="0.7"/>

  <!-- baseClipArea rect -->
  <rect x="150.4" y="34" width="37.5" height="112.5" fill="none" stroke="#e05050" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="169" y="162" text-anchor="middle" font-size="11" fill="#e05050" font-family="sans-serif">minClipWidth</text>

  <!-- endpoint highlight -->
  <circle cx="150.4" cy="33.75" r="4" fill="#e07020"/>
  <circle cx="150.4" cy="146.25" r="4" fill="#e07020"/>

  <!-- annotation: endpoint at x=0 of baseClipArea -->
  <line x1="150.4" y1="22" x2="150.4" y2="170" stroke="#e07020" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="120" y="20" font-size="10" fill="#e07020" font-family="sans-serif">端点 x=0</text>

  <!-- sw annotation -->
  <line x1="150.4" y1="10" x2="189.9" y2="10" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <text x="170" y="8" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">sw</text>

  <!-- innerR*(1-sinθ) annotation -->
  <line x1="150.4" y1="174" x2="53" y2="174" stroke="#50a050" stroke-width="1.5"/>
  <line x1="150.4" y1="170" x2="150.4" y2="178" stroke="#50a050" stroke-width="1"/>
  <line x1="53" y1="170" x2="53" y2="178" stroke="#50a050" stroke-width="1"/>
  <text x="101" y="171" text-anchor="middle" font-size="10" fill="#50a050" font-family="sans-serif">innerR × (1 − sin θ)</text>

  <!-- circle center -->
  <circle cx="53" cy="90" r="3" fill="#666"/>
  <text x="30" y="88" font-size="10" fill="#666" font-family="sans-serif">円中心</text>

  <!-- formula -->
  <rect x="210" y="50" width="160" height="56" rx="4" fill="#e8f9e8" stroke="#6ab86a" stroke-width="1.5"/>
  <text x="290" y="68" text-anchor="middle" font-size="11" fill="#333" font-family="monospace">minClipWidth =</text>
  <text x="290" y="84" text-anchor="middle" font-size="11" fill="#333" font-family="monospace">arcStrokeWidth</text>
  <text x="290" y="98" text-anchor="middle" font-size="11" fill="#333" font-family="monospace">+ innerR × (1 − sin θ)</text>
</svg>
