<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 210" width="580" height="210">
  <rect width="580" height="210" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>

  <!-- LEFT: ArcItem (0ยฐ=top, CW) -->
  <text x="130" y="18" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="sans-serif">ArcItem (Screen02)</text>
  <circle cx="130" cy="115" r="75" fill="none" stroke="#ddd" stroke-width="1.5"/>
  <!-- 0ยฐ tick at top -->
  <line x1="130" y1="40" x2="130" y2="50" stroke="#555" stroke-width="2"/>
  <text x="130" y="36" text-anchor="middle" font-size="12" fill="#555" font-family="sans-serif">0ยฐ</text>
  <!-- 90ยฐ tick at right -->
  <line x1="205" y1="115" x2="195" y2="115" stroke="#aaa" stroke-width="1.5"/>
  <text x="212" y="119" font-size="11" fill="#aaa" font-family="sans-serif">90ยฐ</text>
  <!-- 180ยฐ tick at bottom -->
  <line x1="130" y1="190" x2="130" y2="180" stroke="#aaa" stroke-width="1.5"/>
  <text x="130" y="204" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">180ยฐ</text>

  <!-- arc: begin=60ยฐ(SVG=-30ยฐ), end=120ยฐ(SVG=30ยฐ) -->
  <!-- start: (130+75*sin60, 115-75*cos60)=(130+64.95,115-37.5)=(194.95,77.5) -->
  <!-- end:   (194.95, 152.5) -->
  <path d="M 194.95,77.5 A 75,75 0 0,1 194.95,152.5"
        fill="none" stroke="#4a6fa5" stroke-width="12" stroke-linecap="butt" opacity="0.85"/>

  <!-- arcBegin label -->
  <line x1="130" y1="115" x2="194.95" y2="77.5" stroke="#e07020" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="168" y="90" font-size="11" fill="#e07020" font-family="sans-serif">begin=60ยฐ</text>
  <!-- arcEnd label -->
  <line x1="130" y1="115" x2="194.95" y2="152.5" stroke="#2060a0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="163" y="150" font-size="11" fill="#2060a0" font-family="sans-serif">end=120ยฐ</text>

  <!-- CW arrow -->
  <path d="M 130,52 A 63,63 0 0,1 193,115" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#cw)"/>
  <defs>
    <marker id="cw" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#999"/>
    </marker>
    <marker id="cw2" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#999"/>
    </marker>
  </defs>
  <text x="172" y="60" font-size="10" fill="#999" font-family="sans-serif">CW</text>

  <!-- DIVIDER -->
  <line x1="270" y1="10" x2="270" y2="200" stroke="#ddd" stroke-width="2"/>

  <!-- conversion arrow -->
  <text x="270" y="105" text-anchor="middle" font-size="20" fill="#aaa" font-family="sans-serif">โ</text>
  <text x="270" y="125" text-anchor="middle" font-size="10" fill="#888" font-family="sans-serif">ๅคๆ</text>

  <!-- RIGHT: PathAngleArc (0ยฐ=right, CW) -->
  <text x="415" y="18" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="sans-serif">PathAngleArc (Screen03)</text>
  <circle cx="415" cy="115" r="75" fill="none" stroke="#ddd" stroke-width="1.5"/>
  <!-- 0ยฐ tick at right -->
  <line x1="490" y1="115" x2="480" y2="115" stroke="#555" stroke-width="2"/>
  <text x="496" y="119" font-size="12" fill="#555" font-family="sans-serif">0ยฐ</text>
  <!-- -90ยฐ tick at top -->
  <line x1="415" y1="40" x2="415" y2="50" stroke="#aaa" stroke-width="1.5"/>
  <text x="415" y="36" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">โ90ยฐ</text>
  <!-- 90ยฐ tick at bottom -->
  <line x1="415" y1="190" x2="415" y2="180" stroke="#aaa" stroke-width="1.5"/>
  <text x="415" y="204" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">+90ยฐ</text>

  <!-- arc: startAngle=-30ยฐ, sweepAngle=60ยฐ -->
  <!-- start: (415+75*cos(-30ยฐ), 115+75*sin(-30ยฐ))=(415+64.95,115-37.5)=(479.95,77.5) -->
  <!-- end:   (479.95, 152.5) [same shape as ArcItem arc] -->
  <path d="M 479.95,77.5 A 75,75 0 0,1 479.95,152.5"
        fill="none" stroke="#4a6fa5" stroke-width="12" stroke-linecap="butt" opacity="0.85"/>

  <!-- startAngle label -->
  <line x1="415" y1="115" x2="479.95" y2="77.5" stroke="#e07020" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="445" y="88" font-size="11" fill="#e07020" font-family="sans-serif">startAngle=โ30ยฐ</text>
  <text x="452" y="100" font-size="10" fill="#888" font-family="sans-serif">(= 60ยฐโ90ยฐ)</text>

  <!-- sweepAngle label -->
  <!-- sweep arc: center=(415,115), r=45, from -30ยฐ to +30ยฐ -->
  <!-- start: (415+45*cos(-30ยฐ), 115+45*sin(-30ยฐ)) = (453.97, 92.5) -->
  <!-- end:   (415+45*cos( 30ยฐ), 115+45*sin( 30ยฐ)) = (453.97, 137.5) -->
  <path d="M 453.97,92.5 A 45,45 0 0,1 453.97,137.5" fill="none" stroke="#a020a0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="502" y="112" font-size="11" fill="#a020a0" font-family="sans-serif">sweep=60ยฐ</text>
  <text x="500" y="124" font-size="10" fill="#888" font-family="sans-serif">(= endโbegin)</text>

  <!-- CW arrow -->
  <path d="M 415,52 A 63,63 0 0,1 478,115" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#cw2)"/>
  <text x="457" y="60" font-size="10" fill="#999" font-family="sans-serif">CW</text>
</svg>
